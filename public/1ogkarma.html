        <p class="total">Total: R$ <span id="total-carrinho">0.00</span></p>

        <button id="limpar-carrinho" class="btn-carrinho-extra">🗑️ Limpar Carrinho</button>
        <button id="finalizar-compra" class="btn-carrinho-extra">✔ Finalizar Compra</button>

        <button id="fechar-carrinho" class="fechar-carrinho">Fechar</button>
    </div>

    <button id="abrir-carrinho" class="botao-carrinho">🛒</button>

    <!--Script para o tema escuro gambiarradinho-->

    <button id="mudar-tema">🌙</button>

    <script>

                .forEach(produto => {

                            <p class="preço">R$ ${produto.preço_produto}</p>

                            <h3>${produto.nome_produto} ${produto.tamanho_produto}</h3>

                            </div>
                            `;
                        });


                produtos.filter(produto => produto.img_produto === "imagem/Calca1.png")
                .forEach(produto => {
                    
                    shape.innerHTML += `
                        <div class="produto-item">
                            <img src="${produto.img_produto}" alt="${produto.nome_produto} ${produto.tamanho_produto}">
                            <h3>${produto.nome_produto} ${produto.tamanho_produto}</h3>
                            <p class="preço">R$ ${produto.preço_produto}</p>

                            `;
                        });
                produtos.filter(produto => produto.img_produto === "imagem/Chapeus1.jpg")
                .forEach(produto => {
                    
                    shape.innerHTML += `

                            <img src="${produto.img_produto}" alt="${produto.nome_produto} ${produto.tamanho_produto}">
                            <h3>${produto.nome_produto} ${produto.tamanho_produto}</h3>

                            </div>
                            `;
                        });
                produtos.filter(produto => produto.img_produto === "imagem/Chapeus8.jpg")
                .forEach(produto => {
                    
                    shape.innerHTML += `
                        <div class="produto-item">
                            <img src="${produto.img_produto}" alt="${produto.nome_produto} ${produto.tamanho_produto}">
                            <h3>${produto.nome_produto} ${produto.tamanho_produto}</h3>

                            </div>
                            `;
                        });
                produtos.filter(produto => produto.img_produto === "imagem/Truck3.jpg")
                .forEach(produto => {
                    
                    shape.innerHTML += `
                        <div class="produto-item">
                            <img src="${produto.img_produto}" alt="${produto.nome_produto} ${produto.tamanho_produto}">
                            <h3>${produto.nome_produto} ${produto.tamanho_produto}</h3>
                            <p class="preço">R$ ${produto.preço_produto}</p>
                            <button class="btn-pedido" onclick="adicionarCarrinho('${produto.nome_produto}', ${produto.preço_produto})">Adicionar</button>
                            </div>
                            `;
                        });
            })

            .catch(erro => {
                console.log("Erro:", erro);
            });





        const btn = document.getElementById("mudar-tema");
        const body = document.body;

        if (localStorage.getItem("tema") === "dark") {
            body.classList.add("dark");
            btn.textContent = "☀️";
        }

        btn.addEventListener("click", () => {
            body.classList.toggle("dark");

            if (body.classList.contains("dark")) {
                btn.textContent = "☀️";
                localStorage.setItem("tema", "dark");
            } else {
                btn.textContent = "🌙";
                localStorage.setItem("tema", "light");
            }
        });

        //javascript do carrinho//
        document.addEventListener("DOMContentLoaded", () => {
            let carrinho = [];
            let total = 0;

            const abrirCarrinhoBtn = document.getElementById("abrir-carrinho");
            const fecharCarrinhoBtn = document.getElementById("fechar-carrinho");
            const limparCarrinhoBtn = document.getElementById("limpar-carrinho");
            const finalizarCompraBtn = document.getElementById("finalizar-compra");
            const carrinhoMenu = document.getElementById("carrinho");
            const listaCarrinho = document.getElementById("lista-carrinho");
            const totalCarrinho = document.getElementById("total-carrinho");

            abrirCarrinhoBtn.onclick = () => carrinhoMenu.classList.add("aberto");
            fecharCarrinhoBtn.onclick = () => carrinhoMenu.classList.remove("aberto");

            window.adicionarCarrinho = (nome, preco) => {
                carrinho.push({ nome, preco });
                total += preco;
                atualizarCarrinho();
            };

            function removerItem(index) {
                total -= carrinho[index].preco;
                carrinho.splice(index, 1);
                atualizarCarrinho();
            }

            function atualizarCarrinho() {
                listaCarrinho.innerHTML = "";

                carrinho.forEach((item, index) => {
                    let li = document.createElement("li");

                    li.innerHTML = `
                ${item.nome} - R$ ${item.preco.toFixed(2)}
                <button class="remover-item" onclick="removerItem(${index})">X</button>
            `;

                    listaCarrinho.appendChild(li);
                });

                totalCarrinho.textContent = total.toFixed(2);
            }

            limparCarrinhoBtn.onclick = () => {
                carrinho = [];
                total = 0;
                atualizarCarrinho();
            };

            finalizarCompraBtn.onclick = () => {
                if (carrinho.length === 0) {
                    alert("Carrinho vazio!");
                    return;
                }

                alert("Sua compra foi finalizada! Valeu por fortalecer a OGKARMA");

                carrinho = [];
                total = 0;
                atualizarCarrinho();
            };

            window.removerItem = removerItem;
        });
    </script>
