        let aguardandoResposta = false;
        const historicoChat = []

        const form = document.getElementById('form');
        const respostas = document.getElementById('resposta-bot');
        const botaoEnviar = document.getElementById("btn-enviar");
        const campoMensagem = document.getElementById("mensagem");

        async function enviarMensagem() {
            if (aguardandoResposta) {
                return;
            }

            aguardandoResposta = true;

            campoMensagem.disabled = true;
            botaoEnviar.disabled = true;
            botaoEnviar.textContent = "Respondendo...";

            try {
                const textoDoUsuario = document.getElementById('mensagem').value;
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        mensagem: textoDoUsuario,
                        historico: historicoChat
                    })
                });
                const data = await response.json();

                if (!response.ok) {
                    console.error(data);
                    throw new Error(data.message);
                    return;
                }
                if (!data.resposta) {
                    console.error("Resposta inválida:", data);
                    return;
                }

                console.log(data);
                
                const respostaFormatada = data.resposta.replace(/\n/g, '<br><br>');
                document.getElementById('resposta_bot').innerHTML = respostaFormatada;

                historicoChat.push({
                    role: "user", parts: [{ text: textoDoUsuario }]
                });
                historicoChat.push({
                    role: "model", parts: [{ text: data.resposta }]
                });

            // document.getElementById('resposta_bot').value = data.resposta;
            
        } catch (erro) {
            document.getElementById("resposta_bot").innerHTML =
            "⚠️ O assistente está ocupado. Tente novamente em alguns segundos.";

            console.error(erro);
            
        } finally {
            aguardandoResposta = false;
            botaoEnviar.disabled = false;
            campoMensagem.disabled = false;
            botaoEnviar.textContent = "Enviar";
        }
        }
        form.addEventListener('submit', (evento) => {
            evento.preventDefault();
            enviarMensagem();
        })
